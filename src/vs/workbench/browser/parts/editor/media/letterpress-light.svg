<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#1e1e2e" />
			<stop offset="100%" stop-color="#0f0f16" />
		</linearGradient>
		<linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#00f2fe" />
			<stop offset="100%" stop-color="#4facfe" />
		</linearGradient>
		<linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#ff0844" />
			<stop offset="100%" stop-color="#ffb199" />
		</linearGradient>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="15" result="blur" />
			<feComposite in="SourceGraphic" in2="blur" operator="over" />
		</filter>
	</defs>

	<!-- Background container (optional, usually icons have transparent bg or stylized rounded rectangle) -->
	<rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)" stroke="#333344" stroke-width="4" />

	<!-- S -->
	<path d="M 640 320 C 640 280, 580 256, 512 256 C 400 256, 340 300, 340 360 C 340 460, 680 480, 680 620 C 680 720, 580 768, 512 768 C 380 768, 280 700, 290 620" fill="none" stroke="url(#glow)" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />

	<!-- A (interlocking or overlaying) -->
	<path d="M 320 768 L 512 256 L 704 768 M 400 580 L 624 580" fill="none" stroke="url(#accent)" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />

	<!-- AI / Code nodes -->
	<circle cx="512" cy="256" r="30" fill="#ffffff" />
	<circle cx="320" cy="768" r="30" fill="#ffffff" />
	<circle cx="704" cy="768" r="30" fill="#ffffff" />
</svg>
