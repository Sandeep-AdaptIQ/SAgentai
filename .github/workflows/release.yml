name: Build & Release

on:
  push:
    branches:
      - 'release/**'
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  NODE_OPTIONS: --max-old-space-size=8192
  VSCODE_ARCH: x64

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Electron
        run: npm run electron

      - name: Install built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build client (package)
        run: npx gulp vscode-win32-x64-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build System Setup (EXE)
        run: npx gulp vscode-win32-x64-system-setup

      - name: Build User Setup (EXE)
        run: npx gulp vscode-win32-x64-user-setup

      - name: Build MSI Installer
        shell: pwsh
        run: |
          $RepoDir = $env:GITHUB_WORKSPACE
          $AppDir = Join-Path (Split-Path $RepoDir -Parent) "VSCode-win32-x64"

          if (-not (Test-Path $AppDir)) {
            Write-Error "Packaged app directory not found at $AppDir"
            exit 1
          }

          $WxsPath = Join-Path $RepoDir "build\win32\SAgentai.wxs"
          $MsiOutDir = Join-Path $RepoDir ".build\win32-x64\msi-setup"
          New-Item -ItemType Directory -Path $MsiOutDir -Force | Out-Null

          $MsiPath = Join-Path $MsiOutDir "SAgentaiSetup.msi"
          wix build $WxsPath -arch x64 -b "appdir=$AppDir" -o $MsiPath

          if ($LASTEXITCODE -ne 0) {
            Write-Error "WiX build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          Write-Host "MSI built successfully: $MsiPath"
          Write-Host "Size: $([math]::Round((Get-Item $MsiPath).Length / 1MB, 1)) MB"

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $PackageJson = Get-Content -Raw package.json | ConvertFrom-Json
          $Version = $PackageJson.version
          echo "VERSION=$Version" >> $env:GITHUB_OUTPUT
          echo "Version: $Version"

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          $StagingDir = ".build\release-staging"
          New-Item -ItemType Directory -Path $StagingDir -Force | Out-Null

          # System EXE
          $SystemExe = Get-ChildItem ".build\win32-x64\system-setup\*.exe" | Select-Object -First 1
          if ($SystemExe) {
            Copy-Item $SystemExe.FullName "$StagingDir\SAgentai-Setup-$Version-x64-system.exe"
            Write-Host "Staged system EXE: $($SystemExe.Length / 1MB) MB"
          }

          # User EXE
          $UserExe = Get-ChildItem ".build\win32-x64\user-setup\*.exe" | Select-Object -First 1
          if ($UserExe) {
            Copy-Item $UserExe.FullName "$StagingDir\SAgentai-Setup-$Version-x64-user.exe"
            Write-Host "Staged user EXE: $($UserExe.Length / 1MB) MB"
          }

          # MSI
          $Msi = Get-ChildItem ".build\win32-x64\msi-setup\*.msi" | Select-Object -First 1
          if ($Msi) {
            Copy-Item $Msi.FullName "$StagingDir\SAgentai-Setup-$Version-x64.msi"
            Write-Host "Staged MSI: $($Msi.Length / 1MB) MB"
          }

          Write-Host "`nStaged artifacts:"
          Get-ChildItem $StagingDir | Format-Table Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: .build/release-staging/*
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          $StagingDir = ".build\release-staging"

          # Determine tag name
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $TagName = "${{ github.ref_name }}"
          } else {
            $TagName = "v$Version"
          }

          # Check if release already exists
          $existing = gh release view $TagName 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $TagName already exists, uploading assets..."
            Get-ChildItem "$StagingDir\*" | ForEach-Object {
              gh release upload $TagName $_.FullName --clobber
            }
          } else {
            Write-Host "Creating release $TagName..."
            $ReleaseNotes = @"
          ## SAgentai $Version

          ### Windows Installers
          - **System Setup (EXE)**: Installs for all users (requires admin)
          - **User Setup (EXE)**: Installs for current user only
          - **MSI Installer**: Windows Installer package for enterprise deployment
          "@

            gh release create $TagName `
              --title "SAgentai $Version" `
              --notes $ReleaseNotes `
              --latest

            Get-ChildItem "$StagingDir\*" | ForEach-Object {
              gh release upload $TagName $_.FullName
            }
          }

          Write-Host "Release $TagName published successfully!"

      - name: Create Release (branch push)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && !startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          $StagingDir = ".build\release-staging"
          $BranchName = "${{ github.ref_name }}"
          $TagName = "v$Version"

          Write-Host "Creating release from branch: $BranchName"

          # Create tag at current commit
          git tag $TagName
          git push origin $TagName

          $ReleaseNotes = @"
          ## SAgentai $Version

          ### Windows Installers
          - **System Setup (EXE)**: Installs for all users (requires admin)
          - **User Setup (EXE)**: Installs for current user only
          - **MSI Installer**: Windows Installer package for enterprise deployment

          Built from branch: ``$BranchName``
          "@

          gh release create $TagName `
            --title "SAgentai $Version" `
            --notes $ReleaseNotes `
            --latest

          Get-ChildItem "$StagingDir\*" | ForEach-Object {
            gh release upload $TagName $_.FullName
          }

          Write-Host "Release $TagName published successfully!"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Electron
        run: npm run electron

      - name: Install built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux (x64)
        run: npx gulp vscode-linux-x64-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tar.gz archive
        run: |
          cd ..
          if [ -d "VSCode-linux-x64" ]; then
            tar -czf SAgentai-linux-x64.tar.gz VSCode-linux-x64
            echo "Created SAgentai-linux-x64.tar.gz"
          else
            echo "ERROR: VSCode-linux-x64 directory not found"
            ls -la ..
            exit 1
          fi

      - name: Build .deb package
        run: |
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb

      - name: Build .rpm package
        run: |
          npx gulp vscode-linux-x64-prepare-rpm
          npx gulp vscode-linux-x64-build-rpm

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Stage release artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          STAGING=".build/release-staging"
          mkdir -p "$STAGING"

          # tar.gz
          cp ../SAgentai-linux-x64.tar.gz "$STAGING/SAgentai-$VERSION-linux-x64.tar.gz"

          # .deb
          DEB=$(find .build/linux/deb -name '*.deb' -print -quit)
          if [ -n "$DEB" ]; then
            cp "$DEB" "$STAGING/SAgentai-$VERSION-linux-x64.deb"
          fi

          # .rpm
          RPM=$(find .build/linux/rpm -name '*.rpm' -print -quit)
          if [ -n "$RPM" ]; then
            cp "$RPM" "$STAGING/SAgentai-$VERSION-linux-x64.rpm"
          fi

          echo "Staged artifacts:"
          ls -lh "$STAGING"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: .build/release-staging/*
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG_NAME="v$VERSION"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          sleep 15
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "SAgentai $VERSION" --notes "Multi-platform build" --latest || true
          fi

          for f in .build/release-staging/*; do
            echo "Uploading $f"
            gh release upload "$TAG_NAME" "$f" --clobber
          done

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Electron
        run: npm run electron

      - name: Install built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS (arm64)
        run: npx gulp vscode-darwin-arm64-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create macOS archive
        run: |
          cd ..
          if [ -d "VSCode-darwin-arm64" ]; then
            cd VSCode-darwin-arm64
            zip -Xry ../SAgentai-darwin-arm64.zip .
            echo "Created SAgentai-darwin-arm64.zip"
          else
            echo "ERROR: VSCode-darwin-arm64 directory not found"
            ls -la ..
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Find and Upload Artifacts to Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG_NAME="v$VERSION"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          # Give the Windows job a head start on creating the release so we don't race
          sleep 10
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "SAgentai $VERSION" --notes "macOS & Windows Builds" --latest || true
          fi

          # Upload the macOS arm64 zip
          ZIP_FILE="../SAgentai-darwin-arm64.zip"
          if [ -f "$ZIP_FILE" ]; then
            echo "Uploading $ZIP_FILE"
            gh release upload "$TAG_NAME" "$ZIP_FILE" --clobber
          else
            echo "WARNING: macOS arm64 zip not found at $ZIP_FILE"
          fi
